<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="fg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9B26"/>
      <stop offset="100%" stop-color="#00E5CC"/>
    </linearGradient>
    <filter id="fg-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="fg-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9B26" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FF9B26" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes voteRise1 { 0%{ height:0; y:130; } 100%{ height:40; y:90; } }
      @keyframes voteRise2 { 0%{ height:0; y:130; } 100%{ height:55; y:75; } }
      @keyframes voteRise3 { 0%{ height:0; y:130; } 100%{ height:30; y:100; } }
      @keyframes memberFloat { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-4px); } }
      .member-1 { animation: memberFloat 3s ease-in-out infinite; }
      .member-2 { animation: memberFloat 3.5s ease-in-out infinite 0.7s; }
      .member-3 { animation: memberFloat 4s ease-in-out infinite 1.4s; }
    </style>
  </defs>

  <!-- Background -->
  <circle cx="140" cy="100" r="90" fill="url(#fg-bg)"/>

  <!-- DAO Members (3 people in a semi-circle) -->
  <g class="member-1" filter="url(#fg-glow)">
    <circle cx="70" cy="60" r="20" fill="rgba(17,19,39,0.8)" stroke="#FF9B26" stroke-width="1.5"/>
    <circle cx="70" cy="54" r="5.5" fill="none" stroke="#FF9B26" stroke-width="1.5"/>
    <path d="M60 72 C60 66 64 62 70 62 C76 62 80 66 80 72" fill="none" stroke="#FF9B26" stroke-width="1.5"/>
  </g>

  <g class="member-2" filter="url(#fg-glow)">
    <circle cx="140" cy="40" r="22" fill="rgba(17,19,39,0.8)" stroke="url(#fg-grad)" stroke-width="1.5"/>
    <circle cx="140" cy="33" r="6" fill="none" stroke="#00E5CC" stroke-width="1.5"/>
    <path d="M129 52 C129 45 134 41 140 41 C146 41 151 45 151 52" fill="none" stroke="#00E5CC" stroke-width="1.5"/>
    <!-- Crown / lead indicator -->
    <path d="M133 20 L136 26 L140 22 L144 26 L147 20" fill="none" stroke="#FF9B26" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="member-3" filter="url(#fg-glow)">
    <circle cx="210" cy="60" r="20" fill="rgba(17,19,39,0.8)" stroke="#FF9B26" stroke-width="1.5"/>
    <circle cx="210" cy="54" r="5.5" fill="none" stroke="#FF9B26" stroke-width="1.5"/>
    <path d="M200 72 C200 66 204 62 210 62 C216 62 220 66 220 72" fill="none" stroke="#FF9B26" stroke-width="1.5"/>
  </g>

  <!-- Connecting lines from members to voting box -->
  <line x1="70" y1="80" x2="110" y2="110" stroke="#FF9B26" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="140" y1="62" x2="140" y2="105" stroke="url(#fg-grad)" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="210" y1="80" x2="170" y2="110" stroke="#FF9B26" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.4"/>

  <!-- Voting box / ballot -->
  <rect x="100" y="105" width="80" height="50" rx="10" fill="rgba(17,19,39,0.8)" stroke="url(#fg-grad)" stroke-width="1.5"/>

  <!-- Vote bars inside -->
  <rect x="115" y="118" width="10" height="28" rx="3" fill="rgba(0,229,204,0.3)" stroke="#00E5CC" stroke-width="0.8"/>
  <rect x="135" y="112" width="10" height="34" rx="3" fill="rgba(0,229,204,0.5)" stroke="#00E5CC" stroke-width="0.8"/>
  <rect x="155" y="122" width="10" height="24" rx="3" fill="rgba(255,155,38,0.3)" stroke="#FF9B26" stroke-width="0.8"/>

  <!-- Vote checkmarks above bars -->
  <path d="M117 115 L120 118 L125 113" fill="none" stroke="#00E5CC" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M137 109 L140 112 L145 107" fill="none" stroke="#00E5CC" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M157 119 L160 122 L165 117" fill="none" stroke="#FF9B26" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Result label -->
  <rect x="90" y="168" width="100" height="22" rx="11" fill="rgba(0,229,204,0.1)" stroke="rgba(0,229,204,0.3)" stroke-width="1"/>
  <text x="140" y="183" text-anchor="middle" fill="#00E5CC" font-family="monospace" font-size="10" font-weight="600">PAROLE GRANTED</text>
</svg>