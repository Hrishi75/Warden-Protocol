<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="fs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5CC"/>
      <stop offset="100%" stop-color="#FF9B26"/>
    </linearGradient>
    <filter id="fs-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="fs-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5CC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00E5CC" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes coinFloat1 { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-5px); } }
      @keyframes coinFloat2 { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-7px); } }
      @keyframes shieldPulse { 0%,100%{ opacity: 0.6; } 50%{ opacity: 1; } }
      .coin-1 { animation: coinFloat1 3s ease-in-out infinite; }
      .coin-2 { animation: coinFloat2 3.5s ease-in-out infinite 0.5s; }
      .coin-3 { animation: coinFloat1 4s ease-in-out infinite 1s; }
      .shield-pulse { animation: shieldPulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background glow -->
  <circle cx="140" cy="100" r="90" fill="url(#fs-bg)"/>

  <!-- Shield -->
  <g filter="url(#fs-glow)" class="shield-pulse">
    <path d="M140 40 L180 56 L180 90 C180 116 162 136 140 145 C118 136 100 116 100 90 L100 56 Z"
          fill="rgba(17,19,39,0.8)" stroke="url(#fs-grad)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Checkmark inside shield -->
    <path d="M125 88 L135 98 L158 75" fill="none" stroke="#00E5CC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- SOL Coins floating around shield -->
  <g class="coin-1">
    <circle cx="70" cy="65" r="16" fill="#111327" stroke="#FF9B26" stroke-width="1.5"/>
    <text x="70" y="70" text-anchor="middle" fill="#FF9B26" font-family="system-ui" font-size="12" font-weight="bold">S</text>
  </g>
  <g class="coin-2">
    <circle cx="210" cy="55" r="14" fill="#111327" stroke="#FF9B26" stroke-width="1.5"/>
    <text x="210" y="60" text-anchor="middle" fill="#FF9B26" font-family="system-ui" font-size="11" font-weight="bold">S</text>
  </g>
  <g class="coin-3">
    <circle cx="205" cy="130" r="12" fill="#111327" stroke="#FF9B26" stroke-width="1.5"/>
    <text x="205" y="134" text-anchor="middle" fill="#FF9B26" font-family="system-ui" font-size="10" font-weight="bold">S</text>
  </g>

  <!-- Stake amount label -->
  <rect x="90" y="156" width="100" height="28" rx="14" fill="rgba(17,19,39,0.7)" stroke="#1E2140" stroke-width="1"/>
  <text x="140" y="174" text-anchor="middle" fill="#00E5CC" font-family="monospace" font-size="12" font-weight="600">2.5 SOL</text>

  <!-- Connection lines from coins to shield -->
  <line x1="85" y1="68" x2="102" y2="75" stroke="#FF9B26" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="197" y1="60" x2="178" y2="72" stroke="#FF9B26" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="195" y1="127" x2="178" y2="110" stroke="#FF9B26" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.4"/>
</svg>