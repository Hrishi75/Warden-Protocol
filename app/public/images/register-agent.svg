<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" fill="none">
  <defs>
    <linearGradient id="ra-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5CC"/>
      <stop offset="100%" stop-color="#FF9B26"/>
    </linearGradient>
    <radialGradient id="ra-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5CC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00E5CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="ra-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      @keyframes raFloat { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }
      @keyframes raPulse { 0%,100%{ opacity:0.5; } 50%{ opacity:1; } }
      @keyframes raCheck { 0%{ stroke-dashoffset: 20; } 100%{ stroke-dashoffset: 0; } }
      @keyframes raCoinDrop { 0%{ transform: translateY(-15px); opacity:0; } 100%{ transform: translateY(0); opacity:1; } }
      .ra-float { animation: raFloat 4s ease-in-out infinite; }
      .ra-pulse { animation: raPulse 2.5s ease-in-out infinite; }
      .ra-coin1 { animation: raCoinDrop 1s ease-out forwards; }
      .ra-coin2 { animation: raCoinDrop 1s ease-out 0.3s forwards; opacity: 0; }
      .ra-coin3 { animation: raCoinDrop 1s ease-out 0.6s forwards; opacity: 0; }
    </style>
  </defs>

  <!-- Background glow -->
  <circle cx="160" cy="130" r="120" fill="url(#ra-bg)"/>

  <!-- Agent card outline -->
  <g class="ra-float" filter="url(#ra-glow)">
    <rect x="80" y="35" width="160" height="190" rx="20" fill="rgba(17,19,39,0.85)" stroke="url(#ra-grad)" stroke-width="2"/>

    <!-- ID badge area -->
    <rect x="105" y="55" width="110" height="40" rx="8" fill="rgba(30,33,64,0.6)" stroke="#1E2140" stroke-width="1"/>
    <!-- Avatar circle -->
    <circle cx="125" cy="75" r="10" fill="rgba(0,229,204,0.15)" stroke="#00E5CC" stroke-width="1"/>
    <!-- CPU chip icon in avatar -->
    <rect x="121" y="71" width="8" height="8" rx="1.5" fill="none" stroke="#00E5CC" stroke-width="0.8"/>
    <line x1="123" y1="71" x2="123" y2="69" stroke="#00E5CC" stroke-width="0.6"/>
    <line x1="127" y1="71" x2="127" y2="69" stroke="#00E5CC" stroke-width="0.6"/>
    <line x1="123" y1="79" x2="123" y2="81" stroke="#00E5CC" stroke-width="0.6"/>
    <line x1="127" y1="79" x2="127" y2="81" stroke="#00E5CC" stroke-width="0.6"/>
    <!-- ID text lines -->
    <rect x="142" y="67" width="60" height="5" rx="2.5" fill="#1E2140"/>
    <rect x="142" y="77" width="40" height="4" rx="2" fill="#1E2140"/>

    <!-- Permission fields -->
    <rect x="100" y="108" width="120" height="10" rx="5" fill="rgba(30,33,64,0.5)" stroke="#1E2140" stroke-width="0.8"/>
    <rect x="103" y="111" width="45" height="4" rx="2" fill="#00E5CC" opacity="0.4"/>

    <rect x="100" y="126" width="120" height="10" rx="5" fill="rgba(30,33,64,0.5)" stroke="#1E2140" stroke-width="0.8"/>
    <rect x="103" y="129" width="70" height="4" rx="2" fill="#FF9B26" opacity="0.4"/>

    <rect x="100" y="144" width="120" height="10" rx="5" fill="rgba(30,33,64,0.5)" stroke="#1E2140" stroke-width="0.8"/>
    <rect x="103" y="147" width="30" height="4" rx="2" fill="#6C5CE7" opacity="0.4"/>

    <!-- Register button -->
    <rect x="100" y="168" width="120" height="36" rx="10" fill="url(#ra-grad)" opacity="0.9"/>
    <text x="160" y="191" text-anchor="middle" fill="#0B0D1A" font-family="system-ui" font-size="12" font-weight="700">REGISTER</text>
  </g>

  <!-- SOL coins dropping into slot -->
  <g class="ra-coin1">
    <circle cx="195" cy="28" r="11" fill="#111327" stroke="#FF9B26" stroke-width="1.5"/>
    <text x="195" y="32" text-anchor="middle" fill="#FF9B26" font-family="system-ui" font-size="10" font-weight="bold">S</text>
  </g>
  <g class="ra-coin2">
    <circle cx="225" cy="50" r="9" fill="#111327" stroke="#FF9B26" stroke-width="1.5"/>
    <text x="225" y="54" text-anchor="middle" fill="#FF9B26" font-family="system-ui" font-size="9" font-weight="bold">S</text>
  </g>
  <g class="ra-coin3">
    <circle cx="250" cy="30" r="8" fill="#111327" stroke="#FF9B26" stroke-width="1.2"/>
    <text x="250" y="34" text-anchor="middle" fill="#FF9B26" font-family="system-ui" font-size="8" font-weight="bold">S</text>
  </g>

  <!-- Checkmark / success indicator -->
  <circle cx="250" cy="160" r="16" fill="rgba(0,229,204,0.1)" stroke="#00E5CC" stroke-width="1.5" class="ra-pulse"/>
  <path d="M242 160 L248 166 L259 154" fill="none" stroke="#00E5CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Status label -->
  <rect x="100" y="240" width="120" height="22" rx="11" fill="rgba(0,229,204,0.08)" stroke="rgba(0,229,204,0.2)" stroke-width="1"/>
  <text x="160" y="255" text-anchor="middle" fill="#00E5CC" font-family="monospace" font-size="9" font-weight="600">STAKE LOCKED</text>
</svg>