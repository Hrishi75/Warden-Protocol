services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-db
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev
      POSTGRES_DB: sentinel_protocol
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_protocol"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - dev
      - app
      - full

  # ============================================
  # Solana Program — Build, Deploy, Test
  # ============================================
  solana:
    build:
      context: .
      dockerfile: docker/solana/Dockerfile
    container_name: sentinel-solana
    environment:
      - SOLANA_CLUSTER=devnet
      - RUN_TESTS=false
    volumes:
      # Persist wallet keypair between runs
      - wallet-data:/sentinel/wallet
      # Share IDL with frontend
      - shared-data:/sentinel/shared
      # Persist build cache
      - cargo-cache:/root/.cargo/registry
      - target-cache:/sentinel/target
    profiles:
      - deploy
      - full

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_SOLANA_NETWORK=devnet
        - NEXT_PUBLIC_RPC_ENDPOINT=https://api.devnet.solana.com
    container_name: sentinel-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sentinel:sentinel_dev@postgres:5432/sentinel_protocol
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app
      - full

  # ============================================
  # Dev mode — Frontend with hot reload
  # ============================================
  dev:
    image: node:20-alpine
    container_name: sentinel-dev
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - dev-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SOLANA_NETWORK=devnet
      - NEXT_PUBLIC_RPC_ENDPOINT=https://api.devnet.solana.com
      - DATABASE_URL=postgresql://sentinel:sentinel_dev@postgres:5432/sentinel_protocol
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

volumes:
  wallet-data:
  shared-data:
  cargo-cache:
  target-cache:
  dev-node-modules:
  pgdata: